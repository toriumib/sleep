name: Android Build (AAB)
# 署名用Secrets（KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD）設定後は署名済みAABを出力する。

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # リポジトリの Secrets に以下4つを設定すると署名済みAABが生成される。
      # 未設定の場合は署名なしでビルドされる（ビルド確認用）。
      # KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD
      # 設定方法はREADMEの「AABの自動ビルド（GitHub Actions）」を参照。
      - name: Decode release keystore (if configured)
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          if [ -n "$KEYSTORE_BASE64" ]; then
            echo "$KEYSTORE_BASE64" | base64 -d > release.keystore
            echo "KEYSTORE_PATH=$(pwd)/release.keystore" >> "$GITHUB_ENV"
            echo "KEYSTORE_PASSWORD=$KEYSTORE_PASSWORD" >> "$GITHUB_ENV"
            echo "KEY_ALIAS=$KEY_ALIAS" >> "$GITHUB_ENV"
            echo "KEY_PASSWORD=$KEY_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "KEYSTORE_BASE64が未設定のため、署名なしでビルドします。"
          fi

      - name: Build release AAB
        run: ./gradlew bundleRelease --stacktrace

      # 署名の有無を検証する。署名されていなければ失敗させる（ステップの成否＝署名の有無）。
      - name: Verify AAB is signed
        run: |
          set -e
          AAB=$(ls app/build/outputs/bundle/release/*.aab | head -1)
          echo "AAB: $AAB"
          OUT=$(jarsigner -verify "$AAB" 2>&1 || true)
          echo "$OUT"
          if echo "$OUT" | grep -q "jar verified"; then
            echo "✅ 署名済みAABです。"
          else
            echo "::error::AABが署名されていません（Secrets未設定の可能性）。"
            exit 1
          fi
          echo "--- 署名証明書 ---"
          keytool -printcert -jarfile "$AAB" | grep -iE "SHA256|Owner|Valid" || true

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: okiro-alarm-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
