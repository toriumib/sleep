name: Android Build (AAB)

on:
  push:
    branches: [main]
    paths:
      - "android/**"
      - ".github/workflows/android-build.yml"
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # リポジトリの Secrets に以下4つを設定すると署名済みAABが生成される。
      # 未設定の場合は署名なしでビルドされる（ビルド確認用）。
      # KEYSTORE_BASE64 / KEYSTORE_PASSWORD / KEY_ALIAS / KEY_PASSWORD
      # 設定方法はREADMEの「AABの自動ビルド（GitHub Actions）」を参照。
      - name: Decode release keystore (if configured)
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > release.keystore
          echo "KEYSTORE_PATH=$(pwd)/release.keystore" >> "$GITHUB_ENV"
          echo "KEYSTORE_PASSWORD=${{ secrets.KEYSTORE_PASSWORD }}" >> "$GITHUB_ENV"
          echo "KEY_ALIAS=${{ secrets.KEY_ALIAS }}" >> "$GITHUB_ENV"
          echo "KEY_PASSWORD=${{ secrets.KEY_PASSWORD }}" >> "$GITHUB_ENV"

      - name: Build release AAB
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: okiro-alarm-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
